name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: 检出代码
        uses: actions/checkout@v7

      - name: 安装 Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: 安装 Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: 编译
        run: wails build

      - name: 下载 UPX
        run: |
          $upxVer = "4.2.4"
          $upxUrl = "https://github.com/upx/upx/releases/download/v$upxVer/upx-$upxVer-win64.zip"
          Invoke-WebRequest -Uri $upxUrl -OutFile upx.zip
          Expand-Archive upx.zip -DestinationPath .
          $upxPath = Join-Path (Get-Location) "upx-$upxVer-win64\upx.exe"
          Write-Output "UPX_PATH=$upxPath" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: UPX 压缩
        run: |
          $bin = "build\bin\shadowsocks-client.exe"
          $before = (Get-Item $bin).Length
          & $env:UPX_PATH --best $bin
          $after = (Get-Item $bin).Length
          Write-Host "压缩完成: $([math]::Round($before/1MB,2)) MB → $([math]::Round($after/1MB,2)) MB ($([math]::Round(($before-$after)/$before*100,1))%)"

      - name: 创建 Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/bin/shadowsocks-client.exe
          generate_release_notes: true
